services:
  - type: web_service
    name: SafeMeds AI Backend
    env: python
    plan: starter
    branch: main
    region: oregon
    root: backend
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CORS_ORIGINS
        value: '["https://safe-medes-ai.vercel.app","http://localhost:5173"]'
      - key: LOG_LEVEL
        value: "INFO"
